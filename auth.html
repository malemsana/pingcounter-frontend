<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingCounter | Authenticate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48x48.png">

    <!-- apple -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">

    <!-- pwa -->
    <link rel="manifest" href="/assets/site.webmanifest">

    <!-- android -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/android-chrome-512x512.png">

    <!-- theme -->
    <meta name="theme-color" content="#000000">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #e2e8f0;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }

        .glow-overlay {
            background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
        }
    </style>
</head>

<body class="selection:bg-blue-500/30 overflow-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Use the API base from window location or fixed if needed
        const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE = isLocalHost ? 'http://localhost:3000' : 'https://pingcounter.onrender.com';

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: { class: className, width: size, height: size },
                        nameAttr: 'data-lucide',
                        root: iconRef.current
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"><i data-lucide={name}></i></span>;
        };

        const Logo = ({ className = "h-7" }) => (
            <a href="index.html" className="flex items-center gap-2 mb-8 justify-center">
                <svg className={className} viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(0, 6)" fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M22 12h-4l-3 9L9 3 l-3 9H2" transform="scale(1.2)" />
                    </g>
                    <text x="40" y="28" fontFamily="'Inter', sans-serif" fontWeight="600" fontSize="20" letterSpacing="-0.5">
                        <tspan fill="#e2e8f0">ping</tspan>
                        <tspan fill="#3b82f6">counter</tspan>
                    </text>
                </svg>
            </a>
        );

        const Toast = ({ message, type = 'success', onClose }) => (
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3 px-5 py-3 rounded-lg shadow-2xl border animate-fade-in z-[200] ${type === 'error' ? 'bg-red-950 border-red-900/50 text-red-200' : 'bg-zinc-900 border-zinc-800 text-zinc-100'
                }`}>
                <Icon name={type === 'error' ? "alert-circle" : "check"} size={16} className={type === 'error' ? 'text-red-400' : 'text-emerald-400'} />
                <span className="text-sm font-medium">{message}</span>
                <button onClick={onClose} className="ml-2 text-zinc-500 hover:text-zinc-200"><Icon name="x" size={14} /></button>
            </div>
        );

        function Auth() {
            const [mode, setMode] = useState('login'); // 'login' or 'register'
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                // Redirect if already logged in
                if (localStorage.getItem('token')) {
                    window.location.href = 'dashboard.html';
                }
            }, []);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);

                const formData = new FormData(e.target);
                const payload = Object.fromEntries(formData.entries());
                const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';

                try {
                    const res = await fetch(`${API_BASE}${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await res.json();

                    if (res.ok && data.token) {
                        localStorage.setItem('token', data.token);
                        showToast(mode === 'login' ? 'Welcome back!' : 'Account created successfully!');
                        setTimeout(() => window.location.href = 'dashboard.html', 800);
                    } else {
                        showToast(data.message || data.error || 'Authentication failed', 'error');
                    }
                } catch (err) {
                    showToast('Connection error. Is the server running?', 'error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center relative p-6">
                    <div className="absolute inset-0 bg-grid z-0 pointer-events-none"></div>
                    <div className="absolute inset-0 glow-overlay z-0 pointer-events-none"></div>

                    <div className="w-full max-w-[400px] relative z-10 animate-fade-in">
                        <Logo />

                        <div className="bg-zinc-950 border border-zinc-800 rounded-xl p-8 shadow-2xl">
                            <div className="mb-8">
                                <h2 className="text-xl font-semibold text-white tracking-tight">
                                    {mode === 'login' ? 'Sign in to PingCounter' : 'Create your account'}
                                </h2>
                                <p className="text-zinc-500 text-sm mt-1">
                                    {mode === 'login' ? 'Enter your credentials to access your console.' : 'Get started with high-performance telemetry.'}
                                </p>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-4">
                                {mode === 'register' && (
                                    <div className="space-y-1.5">
                                        <label className="text-xs font-medium text-zinc-400">Full Name</label>
                                        <input
                                            name="full_name"
                                            type="text"
                                            placeholder="Linus Torvalds"
                                            required
                                            className="w-full bg-[#09090b] border border-zinc-800 rounded-md px-3 py-2 text-sm text-zinc-200 outline-none focus:border-blue-500 transition-colors placeholder:text-zinc-700"
                                        />
                                    </div>
                                )}

                                <div className="space-y-1.5">
                                    <label className="text-xs font-medium text-zinc-400">Email Address</label>
                                    <input
                                        name="email"
                                        type="email"
                                        placeholder="name@company.com"
                                        required
                                        className="w-full bg-[#09090b] border border-zinc-800 rounded-md px-3 py-2 text-sm text-zinc-200 outline-none focus:border-blue-500 transition-colors placeholder:text-zinc-700"
                                    />
                                </div>

                                <div className="space-y-1.5">
                                    <div className="flex justify-between items-center">
                                        <label className="text-xs font-medium text-zinc-400">Password</label>
                                        {mode === 'login' && (
                                            <a href="#" className="text-[11px] text-blue-500 hover:text-blue-400 transition">Forgot?</a>
                                        )}
                                    </div>
                                    <input
                                        name="password"
                                        type="password"
                                        placeholder="••••••••"
                                        required
                                        className="w-full bg-[#09090b] border border-zinc-800 rounded-md px-3 py-2 text-sm text-zinc-200 outline-none focus:border-blue-500 transition-colors placeholder:text-zinc-700"
                                    />
                                </div>

                                <button
                                    disabled={loading}
                                    className="w-full mt-2 py-2.5 bg-white text-black rounded-md text-sm font-semibold hover:bg-zinc-200 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    {loading ? <Icon name="loader-2" className="animate-spin" size={16} /> : null}
                                    {mode === 'login' ? 'Sign In' : 'Create Account'}
                                </button>
                            </form>

                            <div className="mt-8 pt-6 border-t border-zinc-900 text-center">
                                <p className="text-sm text-zinc-500">
                                    {mode === 'login' ? "Don't have an account?" : "Already have an account?"}{' '}
                                    <button
                                        onClick={() => setMode(mode === 'login' ? 'register' : 'login')}
                                        className="text-blue-500 font-medium hover:text-blue-400 transition"
                                    >
                                        {mode === 'login' ? 'Sign up' : 'Log in'}
                                    </button>
                                </p>
                            </div>
                        </div>

                        <div className="mt-8 flex justify-center gap-6 text-[11px] font-medium text-zinc-600 uppercase tracking-wider">
                            <a href="keys.html" className="hover:text-zinc-400 transition">Docs</a>
                            <a href="#" className="hover:text-zinc-400 transition">Privacy</a>
                            <a href="#" className="hover:text-zinc-400 transition">Terms</a>
                        </div>
                    </div>

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Auth />);
    </script>
</body>

</html>
