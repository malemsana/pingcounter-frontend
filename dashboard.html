<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Counter | Developer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .animate-slide-down {
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        .animate-slide-in-right {
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: translate(-50%, -40%) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .animate-scale-in {
            animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .glow-pulse {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
            }

            50% {
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.7);
            }

            100% {
                box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
            }
        }
    </style>
</head>

<body class="bg-[#09090b] text-slate-200 selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE = isLocalHost ? 'http://localhost:3000' : 'https://pingcounter.onrender.com';

        // --- Shared UI Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: { class: className, width: size, height: size },
                        nameAttr: 'data-lucide',
                        root: iconRef.current
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef}><i data-lucide={name}></i></span>;
        };

        const Toast = ({ message, type = 'success', onClose }) => (
            <div className={`fixed bottom-6 right-6 flex items-center gap-3 px-5 py-4 rounded-2xl shadow-2xl border animate-fade-in z-[200] ${type === 'error' ? 'bg-red-900 border-red-800 text-white' : 'bg-slate-950 border-slate-800 border-slate-800 text-white'
                }`}>
                <Icon name={type === 'error' ? "alert-circle" : "check-circle"} size={20} className={type === 'success' ? 'text-emerald-400' : 'text-red-400'} />
                <span className="text-sm font-bold tracking-wide">{message}</span>
                <button onClick={onClose} className="ml-4 text-slate-400 hover:text-white transition"><Icon name="x" size={16} /></button>
            </div>
        );

        const Logo = ({ className = "h-10", collapsed = false }) => (
            <svg className={className} viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
                <g transform="translate(0, 6)" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3 l-3 9H2" transform="scale(1.2)" />
                </g>
                {!collapsed && (
                    <text x="40" y="28" font-family="'Inter', sans-serif" font-weight="600" font-size="20" letter-spacing="-0.5">
                        <tspan fill="#e2e8f0">ping</tspan>
                        <tspan fill="#3b82f6">counter</tspan>
                    </text>
                )}
            </svg>
        );

        const SidebarItem = ({ name, icon, active, onClick, badge }) => (
            <button
                onClick={onClick}
                className={`w-full flex items-center justify-between px-3 py-2 rounded-md transition-all duration-150 group mb-0.5 ${active ? 'bg-zinc-800/50 text-slate-100 font-medium' : 'text-slate-400 hover:bg-zinc-800/30 hover:text-slate-200'
                    }`}
            >
                <div className="flex items-center gap-2.5">
                    <Icon name={icon} size={16} className={active ? 'text-blue-500' : 'text-slate-500 group-hover:text-slate-400'} />
                    <span className="text-sm tracking-tight">{name}</span>
                </div>
                {badge > 0 && (
                    <span className="bg-zinc-800 text-slate-300 border border-zinc-700 text-[10px] font-semibold px-1.5 py-0.5 rounded min-w-[18px] text-center">{badge}</span>
                )}
            </button>
        );

        const Sidebar = ({ activeView, setView, user, onLogout, onSettings, pendingCount }) => (
            <aside className="w-56 border-r border-zinc-800 bg-[#09090b] flex flex-col h-screen sticky top-0 shrink-0">
                <div className="p-4 border-b border-zinc-800/50 mb-2">
                    <div className="cursor-pointer" onClick={() => setView('projects')}>
                        <Logo className="h-7" />
                    </div>
                </div>

                <div className="flex-1 px-3 overflow-y-auto mt-2">
                    <div className="text-[10px] font-medium text-slate-500 uppercase tracking-widest mb-2 px-3">Navigation</div>
                    <SidebarItem
                        name="Dashboard"
                        icon="layout-dashboard"
                        active={activeView === 'projects'}
                        onClick={() => setView('projects')}
                    />
                    <SidebarItem
                        name="Usage & Plan"
                        icon="bar-chart-3"
                        active={activeView === 'account'}
                        onClick={onSettings}
                    />

                    <div className="text-[10px] font-medium text-slate-500 uppercase tracking-widest mb-2 mt-6 px-3">Management</div>
                    <SidebarItem
                        name="Keys"
                        icon="key"
                        active={false}
                        onClick={() => window.location.href = 'keys.html'}
                    />
                    <SidebarItem
                        name="Settings"
                        icon="settings"
                        active={false}
                        onClick={onSettings}
                    />
                </div>

                <div className="p-3 border-t border-zinc-800">
                    <button onClick={onSettings} className="w-full flex items-center gap-2.5 p-2 rounded-md hover:bg-zinc-800/30 transition group mb-1">
                        <div className="w-8 h-8 rounded bg-zinc-800 text-slate-300 flex items-center justify-center font-medium border border-zinc-700">
                            {(user?.full_name || user?.email || '?')[0].toUpperCase()}
                        </div>
                        <div className="text-left overflow-hidden">
                            <div className="text-sm font-medium text-slate-200 truncate">{user?.full_name || 'Ping User'}</div>
                            <div className="text-[10px] text-slate-500 truncate mt-0.5">Free Tier</div>
                        </div>
                    </button>
                    <button onClick={onLogout} className="w-full flex items-center gap-2.5 px-3 py-2 rounded-md text-slate-400 hover:text-slate-200 hover:bg-zinc-800/30 transition group text-sm">
                        <Icon name="log-out" size={16} />
                        Logout
                    </button>
                </div>
            </aside>
        );

        const Breadcrumb = ({ view, subView, project, setView, setSubView }) => {
            const items = [{ label: 'Dashboard', onClick: () => setView('projects') }];
            if (view === 'project-detail' && project) {
                items.push({ label: project.project_name, onClick: () => setSubView('overview') });
                if (subView !== 'overview') {
                    items.push({ label: subView.charAt(0).toUpperCase() + subView.slice(1), active: true });
                } else {
                    items[items.length - 1].active = true;
                }
            } else if (view === 'account') {
                items.push({ label: 'Account Settings', active: true });
            } else {
                items[0].active = true;
            }

            return (
                <div className="h-14 border-b border-zinc-800 bg-[#09090b] flex items-center px-6 shrink-0">
                    <div className="flex items-center gap-2 text-sm font-medium text-slate-500">
                        {items.map((item, idx) => (
                            <React.Fragment key={idx}>
                                {idx > 0 && <Icon name="chevron-right" size={14} className="text-zinc-600" />}
                                <span
                                    className={`transition-colors cursor-pointer ${item.active ? 'text-slate-200' : 'hover:text-slate-300'}`}
                                    onClick={item.onClick}
                                >
                                    {item.label}
                                </span>
                            </React.Fragment>
                        ))}
                    </div>
                </div>
            );
        };

        const BadgePreview = ({ style, slug }) => {
            const baseUrl = `${API_BASE}/badge/${slug}?style=${style}`;
            const markdown = `![Ping Counter](${baseUrl})`;
            return (
                <div className="bg-zinc-900/30 border border-zinc-800 rounded-lg p-5 flex flex-col items-center gap-3 group">
                    <div className="text-xs font-medium text-slate-400 capitalize">{style} template</div>
                    <div className="py-2">
                        <img src={baseUrl} alt={`${style} badge`} className="h-5" />
                    </div>
                    <button
                        onClick={() => {
                            navigator.clipboard.writeText(markdown);
                            alert('Markdown copied to clipboard!');
                        }}
                        className="w-full bg-zinc-800 py-1.5 rounded-md text-xs font-medium text-slate-300 hover:text-white hover:bg-zinc-700 transition border border-zinc-700"
                    >
                        Copy Markdown
                    </button>
                </div>
            );
        };

        const KeyInspectModal = ({ apiKey, onClose, onSave, onRevoke, apiBase, project }) => {
            if (!apiKey) return null;

            const [scopes, setScopes] = React.useState(apiKey.scopes ? (typeof apiKey.scopes === 'string' ? apiKey.scopes.split(',').map(s => s.trim()) : apiKey.scopes) : ['ping']);

            const handleScopeChange = (scope) => {
                setScopes(prev => prev.includes(scope) ? prev.filter(s => s !== scope) : [...prev, scope]);
            };

            const isNew = !apiKey.key;
            const displayKey = isNew ? "Will be generated upon save" : apiKey.key;

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-fade-in">
                    <div className="absolute inset-0 bg-[#09090b]/80 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-[#09090b] border border-zinc-800 w-full max-w-lg rounded-lg shadow-xl relative z-10 animate-slide-up flex flex-col h-full max-h-[85vh]">
                        <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/30">
                            <div>
                                <h3 className="text-sm font-medium text-slate-200">{isNew ? 'Create New API Key' : 'Inspect API Key'}</h3>
                                <p className="text-xs text-slate-500 mt-1">Manage access scopes and credentials</p>
                            </div>
                            <button onClick={onClose} className="text-slate-500 hover:text-slate-300 transition">
                                <Icon name="x" size={18} />
                            </button>
                        </div>

                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                            {!isNew && (
                                <div className="space-y-2">
                                    <label className="text-xs font-medium text-slate-400">Secret Key</label>
                                    <div className="flex items-center gap-2">
                                        <input type="text" readOnly value={displayKey} className="flex-1 bg-zinc-950 border border-zinc-800 rounded-md px-3 py-2 text-sm font-mono text-slate-300" />
                                        <button onClick={() => { navigator.clipboard.writeText(displayKey); alert('Copied!'); }} className="bg-zinc-800 hover:bg-zinc-700 text-slate-200 px-3 py-2 rounded-md transition text-sm font-medium border border-zinc-700">Copy</button>
                                    </div>
                                </div>
                            )}

                            <div className="space-y-3">
                                <label className="text-xs font-medium text-slate-400">Access Permissions (Scopes)</label>
                                <div className="space-y-2">
                                    {['ping', 'read', 'admin'].map(s => (
                                        <label key={s} className={`flex items-center gap-3 p-3 rounded-md border cursor-pointer transition ${scopes.includes(s) ? 'bg-blue-500/10 border-blue-500/30' : 'bg-zinc-900 border-zinc-800 hover:border-zinc-700'}`}>
                                            <input type="checkbox" className="accent-blue-500" checked={scopes.includes(s)} onChange={() => handleScopeChange(s)} />
                                            <div>
                                                <div className="text-sm font-medium text-slate-200 capitalize">{s}</div>
                                                <div className="text-xs text-slate-500">{s === 'ping' ? 'Can submit new events and counts.' : s === 'read' ? 'Can fetch private statistics.' : 'Full read/write access.'}</div>
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {!isNew && scopes.includes('ping') && (
                                <div className="space-y-2">
                                    <label className="text-xs font-medium text-slate-400">Quick Integration</label>
                                    <div className="bg-zinc-950 rounded-md border border-zinc-800 p-4 relative">
                                        <pre className="text-[11px] font-mono text-blue-400 overflow-x-auto leading-relaxed">
                                            <code>{`fetch("${apiBase}/p/${displayKey}/${project}/my-event", {\n  method: 'POST'\n})`}</code>
                                        </pre>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="p-5 border-t border-zinc-800 bg-zinc-900/30 flex justify-between items-center gap-4">
                            {!isNew ? (
                                <button onClick={() => onRevoke(apiKey.key)} className="px-4 py-2 bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500 hover:text-white rounded-md text-sm font-medium transition">
                                    Revoke Key
                                </button>
                            ) : <div></div>}

                            <div className="flex gap-3">
                                <button onClick={onClose} className="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-slate-200 rounded-md text-sm font-medium transition">Cancel</button>
                                <button onClick={() => onSave({ ...apiKey, scopes: scopes.join(',') })} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-md text-sm font-medium transition shadow-sm disabled:opacity-50" disabled={scopes.length === 0}>
                                    {isNew ? 'Generate Key' : 'Save Changes'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const EventInspectModal = ({ event, keys, project, onClose, onCopy, onTogglePublic, apiBase, apiRequest, availableStyles = [] }) => {
            if (!event) return null;

            const [hoveredStyle, setHoveredStyle] = React.useState(null);
            const [popoverPos, setPopoverPos] = React.useState({ top: 0, left: 0 });
            const [selectedKey, setSelectedKey] = React.useState('');
            const [eventStats, setEventStats] = React.useState(null);
            const hideTimeout = React.useRef(null);

            React.useEffect(() => {
                if (keys && keys.length > 0 && !selectedKey) {
                    const readKeys = keys.filter(k => k.scopes && (k.scopes.includes('read') || k.scopes.includes('admin')));
                    if (readKeys.length > 0) setSelectedKey(readKeys[0].key);
                    else setSelectedKey(keys[0].key);
                }
            }, [keys]);

            React.useEffect(() => {
                const fetchStats = async () => {
                    const data = await apiRequest(`/api/projects/${project?.project_name}/events/${event?.event_name}/stats`);
                    if (data) setEventStats(data);
                };
                if (event) fetchStats();
            }, [event, project]);

            const handleHover = (style, e) => {
                if (hideTimeout.current) clearTimeout(hideTimeout.current);

                if (!style) {
                    hideTimeout.current = setTimeout(() => {
                        setHoveredStyle(null);
                    }, 300);
                    return;
                }

                const mouseX = e.clientX;
                const mouseY = e.clientY;

                const winW = window.innerWidth;
                const winH = window.innerHeight;

                const popW = 340;
                // Use a slightly smaller estimate, but we will also constrain the modal height via CSS.
                const popH = 350;

                // Start exactly at the cursor (Windows style)
                let left = mouseX;
                let top = mouseY;

                // Flip to the left if it overflows the right edge
                if (left + popW > winW - 10) {
                    left = mouseX - popW;
                }

                // Flip above the cursor if it overflows the bottom edge
                if (top + popH > winH - 10) {
                    top = mouseY - popH;
                }

                // Final safety clamp to keep it strictly inside the viewport
                left = Math.max(10, Math.min(left, winW - popW - 10));
                top = Math.max(10, Math.min(top, winH - popH - 10));

                setHoveredStyle(style);
                setPopoverPos({ top, left });
            };

            const handleMenuEnter = () => {
                if (hideTimeout.current) clearTimeout(hideTimeout.current);
            };

            const handleMenuLeave = () => {
                setHoveredStyle(null);
            };

            const getPublicMd = (style) => `![Ping](${apiBase}/badge/${event.public_slug}?style=${style})`;
            const getPublicUrl = (style) => `${apiBase}/badge/${event.public_slug}?style=${style}`;
            const getAuthMd = (style, key) => `![Ping](${apiBase}/api/v1/badge/${key || '{key}'}/${project?.project_name}/${event.event_name}?style=${style})`;
            const getAuthUrl = (style, key) => `${apiBase}/api/v1/badge/${key || '{key}'}/${project?.project_name}/${event.event_name}?style=${style})`;

            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-2 sm:p-4 animate-fade-in">
                    <div className="absolute inset-0 bg-[#09090b]/80 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="w-full max-w-3xl h-[98vh] bg-[#09090b] border border-zinc-800 relative z-10 shadow-2xl flex flex-col rounded-xl overflow-hidden animate-slide-up">
                        {/* Header */}
                        <div className="px-8 py-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50 sticky top-0 z-20">
                            <div className="flex items-center gap-4">
                                <div className={`p-2 rounded-lg ${event.status === 'active' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-blue-500/10 text-blue-400'}`}>
                                    <Icon name={event.status === 'active' ? 'activity' : 'clock'} size={20} />
                                </div>
                                <div>
                                    <h3 className="text-lg font-semibold text-slate-100 leading-none mb-1">{event.event_name}</h3>
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] text-slate-500 uppercase tracking-wider font-semibold">Event Infrastructure</span>
                                        <span className="w-1 h-1 bg-zinc-700 rounded-full"></span>
                                        <span className={`text-[10px] font-medium px-1.5 py-0.5 rounded ${event.status === 'active' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-blue-500/10 text-blue-400'}`}>
                                            {event.status === 'active' ? 'Live Tracking' : 'Pending Approval'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <button onClick={onClose} className="text-slate-500 hover:text-slate-300 transition p-2 hover:bg-zinc-800 rounded-md">
                                <Icon name="x" size={20} />
                            </button>
                        </div>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-10">

                            {/* Section 1: Access Control */}
                            <section className="space-y-4">
                                <div className="flex items-center gap-2 text-slate-200">
                                    <Icon name="shield" size={18} className="text-blue-400" />
                                    <h4 className="font-medium">Data Privacy & Access</h4>
                                </div>
                                <div className="bg-zinc-900/50 border border-zinc-800 p-6 rounded-xl space-y-5">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <div className="text-sm font-medium text-slate-300">Public Availability</div>
                                            <div className="text-[11px] text-slate-500 mt-1 max-w-sm">Allow unauthenticated access to badges and stats. Enabling this allows anyone to view the counter.</div>
                                        </div>
                                        <button
                                            onClick={() => onTogglePublic(event.event_name, event.public_event)}
                                            className={`px-4 py-2 rounded-md text-xs font-semibold transition-all ${event.public_event ? 'bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500 hover:text-white' : 'bg-blue-600 text-white hover:bg-blue-500'}`}
                                        >
                                            {event.public_event ? 'Disable Public Access' : 'Enable Public Access'}
                                        </button>
                                    </div>

                                    <div className="pt-4 border-t border-zinc-800/50">
                                        <div className="text-[10px] font-medium text-slate-400 uppercase tracking-widest mb-2">Education</div>
                                        <p className="text-xs text-slate-500 leading-relaxed max-w-2xl">
                                            By default, events are <strong className="text-slate-300">Private</strong>. This means they cannot be seen via public slugs or badges.
                                            Use private access for internal metrics, sensitive data, or background processing where you only access data programmatically using API keys.
                                        </p>
                                    </div>
                                </div>
                            </section>

                            {/* Section 2: Programmatic Retrieval */}
                            <section className="space-y-4">
                                <div className="flex items-center gap-2 text-slate-200">
                                    <Icon name="terminal" size={18} className="text-emerald-400" />
                                    <h4 className="font-medium">Programmatic Retrieval</h4>
                                </div>
                                <div className="bg-zinc-950 border border-zinc-800 p-6 rounded-xl space-y-6">
                                    {/* Key Selector Integration */}
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-6 border-b border-zinc-900">
                                        <div className="space-y-1">
                                            <div className="text-xs font-semibold text-slate-200">Active API Key</div>
                                            <div className="text-[10px] text-slate-500">Select a key to populate integration codes.</div>
                                        </div>
                                        <select
                                            value={selectedKey}
                                            onChange={(e) => setSelectedKey(e.target.value)}
                                            className="bg-zinc-900 border border-zinc-800 text-slate-200 text-[11px] px-3 py-1.5 rounded-md focus:outline-none focus:border-blue-500 transition-colors cursor-pointer w-full sm:w-48"
                                        >
                                            <option value="">Select Key...</option>
                                            {keys?.filter(k => k.scopes && (k.scopes.includes('read') || k.scopes.includes('admin'))).map(k => (
                                                <option key={k.key} value={k.key}>
                                                    {k.key.substring(0, 10)}... ({k.scopes})
                                                </option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex items-center justify-between">
                                            <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Read JSON Stats <span className="text-blue-500/80 ml-1">(Requires 'read' scope)</span></div>
                                        </div>

            const [inspectKeyModal, setInspectKeyModal] = React.useState(null);
            const [showNewEventModal, setShowNewEventModal] = React.useState(false);
            const [accountUsage, setAccountUsage] = useState(null);
            const [availableBadgeStyles, setAvailableBadgeStyles] = useState([]);

            useEffect(() => {
                if (token) fetchInitialData();
                else window.location.href = 'auth.html';
            }, [token]);

            // Auto Refresh mechanism
            useEffect(() => {
                let interval;
                if (view === 'project-detail' && selectedProject) {
                    interval = setInterval(() => {
                        refreshProjectView(selectedProject.project_name, true);
                    }, 5000);
                }
                return () => clearInterval(interval);
            }, [view, selectedProject]);

            // Detect new pending events for success feedback
            useEffect(() => {
                if (overview && overview.total_pending_events > prevPendingCount) {
                    if (prevPendingCount === 0) showToast('New event detected! 🚀', 'success');
                }
                if (overview) setPrevPendingCount(overview.total_pending_events);
            }, [overview]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            const fetchInitialData = async () => {
                const res = await fetch(`${API_BASE}/api/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    setUser(await res.json());
                    loadProjects();

                    // Fetch badge templates
                    const styles = await apiRequest('/api/badge-templates', {}, true);
                    if (styles) setAvailableBadgeStyles(styles);
                } else {
                    handleLogout();
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                setToken('');
                setUser(null);
                window.location.href = 'auth.html';
            };

            const enterAccount = async () => {
                setView('loading');
                const data = await apiRequest('/api/account/usage');
                if (data) {
                    setAccountUsage(data);
                    setView('account');
                } else {
                    setView('projects');
                }
            };

            const updateProfile = async (e) => {
                e.preventDefault();
                await apiRequest('/api/account/profile', { method: 'POST', body: JSON.stringify({ full_name: e.target.fullName.value }) });
                fetchInitialData();
                showToast('Profile updated');
            };

            const updatePassword = async (e) => {
                e.preventDefault();
                const res = await apiRequest('/api/account/password', { method: 'POST', body: JSON.stringify({ currentPassword: e.target.currentPassword.value, newPassword: e.target.newPassword.value }) });
                if (res) {
                    showToast('Password updated successfully');
                    e.target.reset();
                }
            };

            const handleCreateProject = async (e) => {
                if (e) e.preventDefault();
                const name = newProjectName.trim();
                if (!name) return;
                const data = await apiRequest('/api/projects', { method: 'POST', body: JSON.stringify({ name }) });
                if (data) {
                    setNewProjectName('');
                    setShowCreateModal(false);
                    loadProjects();
                    showToast('Project created successfully');
                }
            };

            const apiRequest = async (path, options = {}, silent = false) => {
                if (!silent) setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}${path}`, {
                        ...options,
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json',
                            ...options.headers
                        }
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'bad_request');
                    return data;
                } catch (err) {
                    if (!silent) showToast(err.message, 'error');
                    if (err.message === 'unauthorized') handleLogout();
                    return null;
                } finally {
                    if (!silent) setLoading(false);
                }
            };

            const loadProjects = async () => {
                const data = await apiRequest('/api/projects');
                if (data) {
                    setProjects(data);
                    setView('projects');
                }
            };

            const enterProject = async (p) => {
                setSelectedProject(p);
                setSubView('overview');
                setView('project-detail');
                setPrevPendingCount(0);
                setShowGettingStarted(true); // Reset panel visibility
                refreshProjectView(p.project_name);
            };

            const refreshProjectView = async (pName, silent = false) => {
                let [evs, ks, ov, sets] = await Promise.all([
                    apiRequest(`/api/projects/${pName}/events`, {}, silent),
                    apiRequest(`/api/projects/${pName}/keys`, {}, silent),
                    apiRequest(`/api/projects/${pName}/overview`, {}, silent),
                    apiRequest(`/api/projects/${pName}/settings`, {}, silent)
                ]);

                // Phase 2: Auto Key Creation
                if (ks && ks.length === 0 && !silent) {
                    const newKey = await apiRequest(`/api/projects/${pName}/keys`, { method: 'POST', body: JSON.stringify({}) }, true);
                    if (newKey) {
                        ks = await apiRequest(`/api/projects/${pName}/keys`, {}, true);
                    }
                }

                if (evs) setEvents(evs);
                if (ks) setKeys(ks);
                if (ov) setOverview(ov);
                if (sets) setProjectSettings(sets);
            };

            const updateSettings = async (sets) => {
                const res = await apiRequest(`/api/projects/${selectedProject.project_name}/settings`, {
                    method: 'PUT',
                    body: JSON.stringify(sets)
                });
                if (res) {
                    showToast('Project settings updated');
                    refreshProjectView(selectedProject.project_name);
                }
            };

            const handleCreateEvent = async (name) => {
                const data = await apiRequest(`/api/projects/${selectedProject.project_name}/events`, {
                    method: 'POST',
                    body: JSON.stringify({ event_name: name })
                });
                if (data) {
                    showToast(`Event "${name}" created`);
                    setShowNewEventModal(false);
                    refreshProjectView(selectedProject.project_name);
                }
            };

            const handleDeleteProject = async (pName) => {
                const confirmed = confirm(`Are you absolutely sure you want to delete "${pName}"? This will delete all events and metrics. This cannot be undone.`);
                if (!confirmed) return;

                const data = await apiRequest(`/api/projects/${pName}`, { method: 'DELETE' });
                if (data) {
                    showToast(`Project "${pName}" deleted`);
                    loadProjects();
                }
            };

            const approveEvent = async (eName) => {
                const data = await apiRequest(`/api/projects/${selectedProject.project_name}/events/${eName}/approve`, { method: 'POST' });
                if (data) {
                    showToast('Event approved and tracking started');
                    refreshProjectView(selectedProject.project_name);
                }
            };

            const deleteEvent = async (eName) => {
                if (!confirm('Permanently delete this event and its history?')) return;
                const data = await apiRequest(`/api/projects/${selectedProject.project_name}/events/${eName}`, { method: 'DELETE' });
                if (data) refreshProjectView(selectedProject.project_name);
            };

            const generateKey = () => {
                setInspectKeyModal({ isNew: true });
            };

            const saveKey = async (keyData) => {
                if (keyData.isNew) {
                    const data = await apiRequest(`/api/projects/${selectedProject.project_name}/keys`, {
                        method: 'POST',
                        body: JSON.stringify({ scopes: keyData.scopes })
                    });
                    if (data) {
                        setInspectKeyModal(null);
                        refreshProjectView(selectedProject.project_name);
                    }
                } else {
                    const data = await apiRequest(`/api/projects/${selectedProject.project_name}/keys/${keyData.key}`, {
                        method: 'PUT',
                        body: JSON.stringify({ scopes: keyData.scopes })
                    });
                    if (data) {
                        setInspectKeyModal(null);
                        refreshProjectView(selectedProject.project_name);
                        showToast('Key scopes updated');
                    }
                }
            };

            const revokeKey = async (keyId) => {
                if (!confirm('Permanently revoke this API Key? Any integrations using it will break.')) return;
                const data = await apiRequest(`/api/projects/${selectedProject.project_name}/keys/${keyId}`, { method: 'DELETE' });
                if (data) {
                    setInspectKeyModal(null);
                    refreshProjectView(selectedProject.project_name);
                }
            };

            const togglePublicBadge = async (eName, isCurrentlyPublic) => {
                const data = await apiRequest(`/api/projects/${selectedProject.project_name}/events/${eName}/public`, {
                    method: 'POST',
                    body: JSON.stringify({ isPublic: !isCurrentlyPublic })
                });
                if (data) {
                    showToast(!isCurrentlyPublic ? 'Public badge enabled' : 'Public badge disabled');
                    refreshProjectView(selectedProject.project_name);
                    // Update the local modal state if open
                    if (inspectModal && inspectModal.event_name === eName) {
                        setInspectModal({ ...inspectModal, public_event: !isCurrentlyPublic });
                    }
                }
            };

            const openStats = async (eName, days = 30) => {
                const data = await apiRequest(`/api/projects/${selectedProject.project_name}/events/${eName}/stats?days=${days}`);
                if (data) {
                    setStatsModal({ eventName: eName, data, days });
                }
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                showToast('Copied to clipboard');
            };

            const primaryKey = keys.length > 0 ? keys[0].key : '{key}';
            const fetchSnippet = `fetch("${API_BASE}/p/${primaryKey}/${selectedProject?.project_name}/signup")`;

            if (view === 'loading') return (
                <div className="h-screen flex items-center justify-center bg-slate-950">
                    <div className="animate-spin text-blue-500"><Icon name="loader-2" size={40} /></div>
                </div>
            );


            return (
                <div className="flex h-screen bg-slate-950 text-slate-200 font-sans overflow-hidden">
                    <Sidebar
                        activeView={view}
                        setView={setView}
                        user={user}
                        onLogout={handleLogout}
                        onSettings={enterAccount}
                    />

                    <div className="flex-1 flex flex-col min-w-0 relative">
                        <Breadcrumb
                            view={view}
                            subView={subView}
                            project={selectedProject}
                            setView={setView}
                            setSubView={setSubView}
                        />

                        <main className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            <div className="max-w-7xl mx-auto">
                                {view === 'projects' && (
                                    <ProjectList
                                        projects={projects}
                                        onSelect={enterProject}
                                        onCreateClick={() => setShowCreateModal(true)}
                                    />
                                )}

                                {view === 'project-detail' && selectedProject && (
                                    <ProjectDetail
                                        project={selectedProject}
                                        subView={subView}
                                        setSubView={setSubView}
                                        events={events}
                                        keys={keys}
                                        overview={overview}
                                        onApprove={approveEvent}
                                        onDeleteEvent={deleteEvent}
                                        onTogglePublic={togglePublicBadge}
                                        onInspect={(e) => setInspectModal(e)}
                                        onStats={openStats}
                                        onNewEvent={() => setShowNewEventModal(true)}
                                        onGenerateKey={generateKey}
                                        onDeleteProject={handleDeleteProject}
                                        onCopy={(t) => copyToClipboard(t)}
                                        settings={projectSettings}
                                        onUpdateSettings={updateSettings}
                                        onInspectKey={setInspectKeyModal}
                                        availableStyles={availableBadgeStyles}
                                    />
                                )}

                                {view === 'account' && accountUsage && (
                                    <AccountSettings
                                        user={user}
                                        usage={accountUsage}
                                        updateProfile={updateProfile}
                                        updatePassword={updatePassword}
                                    />
                                )}
                            </div>
                        </main>
                    </div>

                    {/* Modals & Overlays */}
                    <StatsModal
                        isOpen={!!statsModal}
                        data={statsModal?.data || {}}
                        eventName={statsModal?.eventName}
                        days={statsModal?.days}
                        onClose={() => setStatsModal(null)}
                        onRefresh={openStats}
                    />

                    <NewEventModal
                        isOpen={showNewEventModal}
                        onClose={() => setShowNewEventModal(false)}
                        onSubmit={handleCreateEvent}
                        projectName={selectedProject?.project_name}
                    />

                    <EventInspectModal
                        event={inspectModal}
                        keys={keys}
                        project={selectedProject}
                        onClose={() => setInspectModal(null)}
                        onCopy={(t) => copyToClipboard(t)}
                        onTogglePublic={togglePublicBadge}
                        apiBase={API_BASE}
                        apiRequest={apiRequest}
                        availableStyles={availableBadgeStyles}
                    />

                    {inspectKeyModal && (
                        <KeyInspectModal
                            apiKey={inspectKeyModal}
                            onClose={() => setInspectKeyModal(null)}
                            onSave={saveKey}
                            onRevoke={revokeKey}
                            apiBase={API_BASE}
                            project={selectedProject?.project_name}
                        />
                    )}

                    {showCreateModal && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 animate-fade-in">
                            <div className="absolute inset-0 bg-[#09090b]/80 backdrop-blur-sm" onClick={() => setShowCreateModal(false)}></div>
                            <div className="bg-[#09090b] border border-zinc-800 w-full max-w-md rounded-lg p-6 relative z-10 shadow-xl animate-slide-up">
                                <div className="mb-6">
                                    <h3 className="text-lg font-semibold text-slate-100 mb-1">Initialize Project</h3>
                                    <p className="text-xs text-slate-500">Scoped environment for metric aggregation</p>
                                </div>

                                <form onSubmit={handleCreateProject} className="space-y-5">
                                    <div>
                                        <label className="block text-xs font-medium text-slate-400 mb-1.5">Unique Namespace</label>
                                        <input
                                            autoFocus
                                            type="text"
                                            placeholder="e.g. monolith-production"
                                            value={newProjectName}
                                            onChange={(e) => setNewProjectName(e.target.value.toLowerCase().replace(/[^a-z0-9-]/g, '-'))}
                                            className="w-full bg-[#09090b] border border-zinc-700 rounded-md px-3 py-2 text-slate-200 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-slate-600"
                                        />
                                        <p className="text-[11px] font-mono text-slate-500 mt-2">Path: /p/:key/<span className="text-blue-400">{newProjectName || '{slug}'}</span>/:event</p>
                                    </div>

                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setShowCreateModal(false)} className="flex-1 px-4 py-2 rounded-md bg-zinc-800 text-slate-300 font-medium text-sm hover:bg-zinc-700 transition">Cancel</button>
                                        <button type="submit" disabled={!newProjectName.trim()} className="flex-[2] px-4 py-2 rounded-md bg-blue-600 text-white font-medium text-sm hover:bg-blue-500 transition shadow-sm disabled:opacity-50">Create Workspace</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
