<svg
  xmlns="http://www.w3.org/2000/svg"
  width="{{totalWidth}}"
  height="28"
  viewBox="0 0 {{totalWidth}} 28"
  role="img"
  aria-label="{{label}}: {{count}}"
>
  <defs>
    <linearGradient id="classicLabel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="classicCount" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer Border -->
  <rect
    x="0.5"
    y="0.5"
    width="{{totalWidth}}-1"
    height="27"
    rx="6"
    fill="#0f172a"
    stroke="#475569"
  />

  <!-- Label Section -->
  <rect
    x="1"
    y="1"
    width="{{labelWidth}}"
    height="26"
    rx="5"
    fill="url(#classicLabel)"
  />

  <!-- Count Section -->
  <rect
    x="{{labelWidth}}"
    y="1"
    width="{{countWidth}}"
    height="26"
    rx="5"
    fill="url(#classicCount)"
  />

  <!-- Divider -->
  <line
    x1="{{labelWidth}}"
    y1="3"
    x2="{{labelWidth}}"
    y2="25"
    stroke="rgba(255,255,255,0.15)"
  />

  <!-- Highlight -->
  <line
    x1="2"
    y1="2"
    x2="{{totalWidth}}-2"
    y2="2"
    stroke="rgba(255,255,255,0.18)"
  />

  <!-- Branding Icon -->
  <g
    transform="translate({{iconX}}, 7) scale(0.42)"
    stroke="#93c5fd"
    stroke-width="2"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="{{iconPath}}" />
  </g>

  <!-- Label Text -->
  <text
    x="{{labelCenterX}}"
    y="18"
    text-anchor="middle"
    font-family="Verdana, DejaVu Sans, sans-serif"
    font-size="11"
    fill="#f8fafc"
    filter="url(#textShadow)"
  >
    {{label}}
  </text>

  <!-- Count Text -->
  <text
    x="{{countCenterX}}"
    y="18"
    text-anchor="middle"
    font-family="Verdana, DejaVu Sans, sans-serif"
    font-size="11"
    font-weight="bold"
    fill="#ffffff"
    filter="url(#textShadow)"
  >
    {{count}}
  </text>
</svg>